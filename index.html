<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>頁面已搬遷</title>
  <script>
    (function() {
      var base = 'https://irvin.github.io/web-resilience-test-profile/';
      var search = window.location.search || '';
      var target = base + search;

      var link = document.createElement('link');
      link.rel = 'canonical';
      link.href = target;
      document.head.appendChild(link);

      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>此頁面已搬遷至 <a id="new-url" href="#">新位置</a>，如果沒有自動跳轉，請點擊連結。</p>
  <script>
    (function() {
      var base = 'https://irvin.github.io/web-resilience-test-profile/';
      var search = window.location.search || '';
      var target = base + search;
      document.getElementById('new-url').href = target;
      document.getElementById('new-url').textContent = target;
    })();
  </script>
</body>
</html>
